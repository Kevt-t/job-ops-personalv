# =============================================================================
# Job Ops - Docker Compose Configuration
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: job-ops-postgres
    environment:
      - POSTGRES_DB=jobops
      - POSTGRES_USER=jobops
      - POSTGRES_PASSWORD=jobops
    volumes:
      - jobops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobops -d jobops"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  job-ops:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/dakheera47/job-ops:latest
    container_name: job-ops
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3001"
    volumes:
      - jobops-app-data:/app/data
    environment:
      # Server config
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://jobops:jobops@postgres:5432/jobops}

      # Python path (uses system python in container)
      - PYTHON_PATH=/usr/bin/python3

    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    develop:
      watch:
        # Rebuild container when package.json changes
        - path: ./orchestrator/package.json
          action: rebuild
        - path: ./orchestrator/package-lock.json
          action: rebuild
        # Sync source code changes and rebuild inside container
        - path: ./orchestrator/src
          target: /app/orchestrator/src
          action: sync+restart
        # Sync extractor changes
        - path: ./extractors/hiringcafe/src
          target: /app/extractors/hiringcafe/src
          action: sync+restart
        - path: ./extractors/jobspy
          target: /app/extractors/jobspy
          action: sync+restart

# Volumes for data persistence
volumes:
  jobops-app-data:
  jobops-postgres-data:
